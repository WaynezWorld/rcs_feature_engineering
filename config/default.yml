# Feature engineering config — used by run_feature_engineering.py
# Minimal subset of default.yml; only the sections needed for the feature pipeline.

# Data source column names (must match your input CSV headers)
data_source:
  key_columns:
    - "Profit Center"
  amount_column: "Actual"
  date_column: "Year Period"
  date_format: "year_period"

# Segment-level: set to "rollup_shop" if your CSV has a segment column,
# or "company" to treat all rows as one series.
forecasting:
  segment_level: "company"

# Validation rules applied after feature engineering
validation:
  enabled: true
  rules:
    - name: "null_check"
      type: "null"
      columns: ["Profit Center", "Year Period", "Actual"]
    - name: "date_range_check"
      type: "date_range"
      column: "Year Period"
      min_date: "20190101"

# Feature engineering pipeline
feature_engineering:
  enabled: true
  features:
    - name: "lag_features"
      type: "lag"
      columns: ["Actual"]
      lags: [1, 3, 6, 12]
    - name: "rolling_mean"
      type: "rolling_mean"
      column: "Actual"
      windows: [3, 6, 12]
    - name: "seasonal_features"
      type: "seasonal"
      date_column: "Year Period"
    - name: "calendar_features"
      type: "calendar"
      date_column: "Year Period"
    - name: "yoy_growth"
      type: "growth"
      columns: ["Actual"]
      periods: [12]

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/rct_forecast.log"
